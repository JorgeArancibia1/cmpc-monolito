server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Cabeceras de seguridad (aplican a todas las respuestas) ──────────────────
  # CSP: principal defensa anti-XSS. 'unsafe-inline' en style por los estilos en
  # línea de los gráficos del dashboard. connect-src incluye la API local (demo) y
  # https: para el backend en producción → en prod, fijar el origen exacto de la API.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://res.cloudinary.com; font-src 'self' data:; connect-src 'self' http://localhost:3002 https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;

  # SPA: cualquier ruta cae en index.html (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Assets con hash: cache largo. Sin add_header aquí → heredan las cabeceras de seguridad.
  location /assets/ {
    expires 1y;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
